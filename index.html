<!DOCTYPE html>
<html>
<head>
    <title>ZedPrep - Learn. Practice. Succeed.</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            font-family: Arial;
            margin: 0;
            background: #f5f7ff;
        }

        header {
            background: #1e3a8a;
            color: white;
            padding: 20px;
            text-align: center;
        }

        .container {
            padding: 20px;
        }

        .card {
            background: white;
            padding: 15px;
            margin: 10px 0;
            border-radius: 10px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }

        .button {
            display: inline-block;
            padding: 10px 15px;
            background: #2563eb;
            color: white;
            text-decoration: none;
            border-radius: 5px;
        }
    </style>
</head>

<body>

<header>
    <h1>ZedPrep</h1>
    <p>Learn. Practice. Succeed.</p>
</header>

<div class="container">

    <div class="card">
        <h2>Welcome to ZedPrep</h2>
        <p>Your free revision platform for Grades 8–12 in Zambia.</p>
    </div>

    <div class="card">
        <h3>Start Learning</h3>
        <p>Choose a subject and begin revision quizzes.</p>
        <a class="button" href="#">Go to Subjects</a>
    </div>

    <div class="card">
        <h3>Top Subjects</h3>
        <ul>
            <li>Mathematics</li>
            <li>English</li>
            <li>Biology</li>
        </ul>
    </div>

</div>

</body>
</html>
