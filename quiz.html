<!DOCTYPE html>
<html>
<head>
<title>ZedPrep Algebra Quiz</title>
<link rel="stylesheet" href="style.css">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>

<header>
<h1>ZedPrep Algebra Quiz</h1>
<p>Grade 12 Mathematics</p>
</header>

<div class="container">

<div class="card">
<h2 id="question">Loading...</h2>

<button class="button" onclick="answer(0)" id="a"></button><br><br>
<button class="button" onclick="answer(1)" id="b"></button><br><br>
<button class="button" onclick="answer(2)" id="c"></button>

<p id="result"></p>
</div>

</div>

<script>

const quiz = [

{
q:"Solve: 2x + 3 = 11",
options:["x = 4","x = 5","x = 6"],
correct:0
},

{
q:"Factorize x² + 5x + 6",
options:["(x+2)(x+3)","(x+1)(x+6)","(x+4)(x+2)"],
correct:0
},

{
q:"Solve: 3x = 15",
options:["3","4","5"],
correct:2
},

{
q:"What is x if x + 8 = 20?",
options:["10","12","14"],
correct:1
},

{
q:"Simplify: 2a + 3a",
options:["5a","6a","5"],
correct:0
}
,
{
q:"Solve: x + 9 = 15",
options:["6","5","4"],
correct:0
},

{
q:"Solve: 5x = 25",
options:["4","5","6"],
correct:1
},

{
q:"Simplify: 4a + 2a",
options:["6a","8a","6"],
correct:0
},

{
q:"What is x if x - 7 = 3?",
options:["9","10","11"],
correct:1
},

{
q:"Factorize x² + 7x + 12",
options:["(x+3)(x+4)","(x+2)(x+6)","(x+1)(x+12)"],
correct:0
},

{
q:"Solve: 7x = 49",
options:["5","6","7"],
correct:2
},

{
q:"Simplify: 8b - 3b",
options:["5b","11b","24b"],
correct:0
},

{
q:"What is x if 2x = 18?",
options:["7","8","9"],
correct:2
},

{
q:"Factorize x² + 8x + 15",
options:["(x+3)(x+5)","(x+2)(x+7)","(x+1)(x+15)"],
correct:0
},

{
q:"Solve: x/4 = 5",
options:["20","10","15"],
correct:0
}
];

let current = 0;
let score = 0;

function loadQuestion(){

document.getElementById("question").innerHTML = quiz[current].q;

document.getElementById("a").innerHTML =
quiz[current].options[0];

document.getElementById("b").innerHTML =
quiz[current].options[1];

document.getElementById("c").innerHTML =
quiz[current].options[2];

}

function answer(choice){

if(choice === quiz[current].correct){
score++;
}

current++;

if(current < quiz.length){
loadQuestion();
}
else{

let message = "";

if(score === quiz.length){
message = "🏆 Excellent! Perfect score!";
}
else if(score >= 4){
message = "🔥 Great job! You're exam ready.";
}
else if(score >= 3){
message = "👍 Good work. Keep practicing.";
}
else{
message = "📚 More revision needed.";
}

let percentage = Math.round((score / quiz.length) * 100);

document.querySelector(".card").innerHTML =
"<h2>🎉 Quiz Complete!</h2>" +
"<h3>" + message + "</h3>" +
"<p><strong>Score:</strong> " + percentage + "%</p>" +
"<p>" + score + " correct out of " + quiz.length + "</p>" +
"<br><a class='button' href='quiz.html'>🔄 Try Again</a>";

}

}

loadQuestion();

</script>

</body>
</html>
